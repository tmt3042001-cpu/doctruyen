<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Đọc Truyện Cá Nhân</title>
    <!-- Nhúng phông chữ Inter và Roboto cao cấp từ Google Fonts để đảm bảo hiển thị mượt mà -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* ĐỊNH DẠNG THEO THÔNG SỐ ĐÃ CHỈ ĐỊNH */
        body {
            background-color: #f7f4eb; /* Nền trắng kem / vàng nhạt dịu mắt, chống lóa */
            color: #2b2b2b; /* Màu chữ xám đậm tiêu chuẩn (không dùng màu đen tuyền gây mỏi mắt) */
            font-family: 'Inter', 'Roboto', sans-serif; /* Phông chữ Sans-serif hiện đại, sắc nét */
            font-size: 18px; /* Kích thước chữ tiêu chuẩn (từ 16px - 18px) */
            line-height: 1.6; /* Khoảng cách dòng chuẩn 1.6 */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 680px; /* Chiều rộng quét mắt tối ưu theo chiều ngang */
            width: 100%;
            background-color: #faf8f5; /* Màu nền hộp truyện trắng kem nhẹ nhàng */
            padding: 35px 30px;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); /* Đổ bóng nhẹ sang trọng */
            box-sizing: border-box;
        }
        h1 {
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a; /* Màu tiêu đề đậm hơn để phân cấp nội dung */
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            line-height: 1.4;
            padding-bottom: 15px;
            border-bottom: 2px solid #eae6db;
        }
        /* ĐỊNH DẠNG VĂN BẢN TRUYỆN */
        .content {
            white-space: pre-wrap; /* Giữ nguyên định dạng xuống dòng từ file gốc .txt */
            text-align: justify; /* Căn đều hai bên thẳng hàng thẳng lối giống trang sách */
            word-wrap: break-word;
            letter-spacing: 0.1px; /* Khoảng cách ký tự tối ưu cho phông Sans-serif */
        }
        /* KHỐI ĐIỀU HƯỚNG CHUYỂN CHƯƠNG */
        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 45px;
            padding-top: 20px;
            border-top: 2px solid #eae6db;
        }
        button {
            background-color: #2b2b2b; /* Màu nút xám đậm đồng bộ với màu chữ */
            color: #f7f4eb; /* Màu chữ trên nút là màu nền kem */
            font-family: 'Inter', sans-serif;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s, opacity 0.2s;
        }
        button:hover {
            background-color: #404040; /* Đổi màu nhẹ khi di chuột vào */
        }
        button:disabled {
            background-color: #d1cbdc;
            color: #a19a9a;
            cursor: not-allowed;
            opacity: 0.6;
        }
        /* Tối ưu hóa kích thước chữ hiển thị riêng cho màn hình điện thoại di động */
        @media (max-width: 600px) {
            body { 
                font-size: 16px; /* Chuyển về 16px trên mobile giúp bố cục cân đối hơn */
                padding: 10px; 
            }
            .container { padding: 25px 15px; }
            h1 { font-size: 20px; }
            button { padding: 10px 18px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="chapter-title">Đang kết nối dữ liệu...</h1>
    <div class="content" id="chapter-content">Vui lòng chờ trong giây lát...</div>
    
    <div class="navigation">
        <button id="prev-btn" onclick="changeChapter(-1)">« Chương Trước</button>
        <button id="next-btn" onclick="changeChapter(1)">Chương Sau »</button>
    </div>
</div>

<script>
    // CHÚ Ý: Đảm bảo điền đúng tên file truyện .txt của bạn ở đây
    const FILE_NAME = "Bat_Dau_Danh_Dau_Hoang_Co_Thanh_The.txt";

    let chapters = [];
    let currentChapterIndex = 0;

    async function loadStoryFile() {
        try {
            const response = await fetch(FILE_NAME);
            
            // Đọc file dưới dạng Buffer và giải mã UTF-8 để triệt tiêu lỗi lỗi font tiếng Việt
            const buffer = await response.arrayBuffer();
            const decoder = new TextDecoder('utf-8');
            const text = decoder.decode(buffer);
            
            // Quét và bóc tách tiêu đề chương dựa vào định dạng "=== Tên Chương ===" từ tool cào
            const regex = /===\s*(Chương\s+\d+.*?)\s*===/gi;
            
            let matches = [];
            let match;
            while ((match = regex.exec(text)) !== null) {
                matches.push({
                    title: match[1].trim(),
                    index: match.index,
                    lastIndex: regex.lastIndex
                });
            }
            
            if (matches.length === 0) {
                // Nếu file không có ký tự tách chương, hiển thị toàn bộ nội dung
                chapters.push({ title: "Nội dung truyện", content: text.trim() });
            } else {
                for (let i = 0; i < matches.length; i++) {
                    let start = matches[i].lastIndex;
                    let end = (i + 1 < matches.length) ? matches[i + 1].index : text.length;
                    let body = text.substring(start, end).trim();
                    
                    chapters.push({
                        title: matches[i].title,
                        content: body
                    });
                }
            }
            
            if (chapters.length > 0) {
                currentChapterIndex = 0;
                renderChapter();
            }
        } catch (error) {
            document.getElementById('chapter-content').innerText = "Không thể tải file dữ liệu truyện. Hãy chắc chắn rằng bạn đã đặt file .txt nằm cùng thư mục với file index.html. Chi tiết lỗi: " + error.message;
        }
    }

    function renderChapter() {
        if (chapters.length === 0) return;
        
        const chap = chapters[currentChapterIndex];
        document.getElementById('chapter-title').innerText = chap.title;
        document.getElementById('chapter-content').innerText = chap.content;
        
        // Điều khiển tắt/mở các nút bấm chuyển chương đầu/cuối
        document.getElementById('prev-btn').disabled = (currentChapterIndex === 0);
        document.getElementById('next-btn').disabled = (currentChapterIndex === chapters.length - 1);
        
        // Cuộn mượt màn hình lên trên đầu trang khi chuyển sang chương mới
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function changeChapter(direction) {
        currentChapterIndex += direction;
        if (currentChapterIndex >= 0 && currentChapterIndex < chapters.length) {
            renderChapter();
        }
    }

    window.onload = loadStoryFile;
</script>

</body>
</html>
