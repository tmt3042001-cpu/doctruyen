<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quân Thiên Đế</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
        <style>
        :root {
            --bg-body: #f7f4eb;     
            --bg-container: #faf8f5;
            --text-color: #2b2b2b;
            --border-color: #eae6db;
            --btn-bg: #2b2b2b;
            --btn-text: #f7f4eb;
            --font-reader: 'Inter', sans-serif;
            --size-reader: 18px;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-color);
            font-family: var(--font-reader);
            font-size: var(--size-reader);
            line-height: 1.6;
            margin: 0;
            padding: 90px 20px 80px 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s, color 0.3s;
        }

           /* THANH CHỨC NĂNG CỐ ĐỊNH PHẲNG (FIXED TOOLBAR) */
        .toolbar {
            position: fixed;
            top: 4px; 
            left: 50%;
            transform: translateX(-50%);
            max-width: 680px;
            width: 100%;
            background-color: var(--bg-container);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            box-sizing: border-box;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            z-index: 999;
            /* Hiệu ứng trượt êm ái khi đóng mở */
            transition: top 0.25s ease-out; 
        }

        /* ĐOẠN SỬA LỖI: Khi menu ẩn đi, chừa lại chính xác 24px chiều cao của Nút Tay Nắm lộ ra màn hình */
        .toolbar.hide-menu {
            top: -65px; /* Giữ khoảng cách hoàn hảo để nút không bao giờ bị bay mất trên PC */
        }

        /* THIẾT KẾ NÚT TAY NẮM CỬA LUÔN NỔI */
        .pull-tab {
            position: absolute;
            bottom: -22px; 
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--bg-container);
            border: 1px solid var(--border-color);
            border-top: none; 
            padding: 2px 25px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 0 0 10px 10px;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            z-index: 1000;
        }

        /* Tối ưu ẩn menu riêng cho màn hình điện thoại di động */
        @media (max-width: 600px) {
            body { padding: 130px 10px 70px 10px; } 
            .toolbar { gap: 6px; padding: 8px; border-radius: 0; }
            /* Mobile menu có nhiều dòng cao hơn nên cần đẩy lên nhiều hơn, nhưng vẫn lộ nút */
            .toolbar.hide-menu { 
                top: -115px; 
            } 
            .container { padding: 25px 15px; }
            h1 { font-size: 20px; }
            .fixed-navigation { border-radius: 0; padding: 10px; }
            .nav-btn { padding: 8px 14px; font-size: 13px; }
        }
        /* KHẮC PHỤC LỖI BUNG MỤC LỤC: ẨN VÀ ĐƯA MỤC LỤC VỀ SIDEBAR BÊN TRÁI */
        .toc-sidebar {
            display: none; /* Bắt buộc ẩn đi khi mới vào trang */
            position: fixed;
            top: 0; 
            left: 0;
            width: 320px;
            height: 100%;
            background-color: var(--bg-container);
            border-right: 1px solid var(--border-color);
            box-shadow: 4px 0 15px rgba(0,0,0,0.15);
            z-index: 1001; /* Luôn nổi lên trên cùng màn hình */
            padding: 20px;
            box-sizing: border-box;
            flex-direction: column;
        }

        /* Lớp nền mờ màu đen để ẩn nội dung truyện phía sau khi mở mục lục */
        .overlay {
            display: none; /* Bắt buộc ẩn đi khi mới vào trang */
            position: fixed;
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        /* Định dạng danh sách chương chữ gọn gàng hơn */
        .toc-list {
            overflow-y: auto;
            flex-grow: 1;
            list-style: none;
            padding: 0;
            margin: 15px 0 0 0;
        }

        .toc-list li {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-color);
        }

        .toc-list li:hover, .toc-list li.active {
            background-color: var(--bg-body);
            font-weight: 600;
        }


    </style>
</head>
<body>

<div id="progress-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 4px; background-color: rgba(0,0,0,0.05); z-index: 10000;">
    <div id="progress-bar" style="width: 0%; height: 100%; background-color: #2ecc71; transition: width 0.1s ease;"></div>
</div>

<!-- THANH CÔNG CỤ TÍCH HỢP NÚT TAY NẮM CHUẨN CẤU TRÚC -->
<div class="toolbar" id="main-toolbar">
    <!-- Nút tay nắm cửa điều khiển thủ công -->
    <div class="pull-tab" id="pull-tab" onclick="toggleToolbarManual()">▲</div>

    <div class="tool-group">
        <button onclick="toggleTOC()">☰ Mục Lục</button>
    </div>
    
    <div class="tool-group">
        <button id="audio-btn" onclick="toggleAudio()">▶ Đọc</button>
        <select id="speed-select" onchange="changeSpeed(this.value)">
            <option value="1.0" selected>1.0x</option>
            <option value="1.1">1.1x</option>
            <option value="1.2">1.2x</option>
            <option value="1.3">1.3x</option>
        </select>
    </div>

    <div class="tool-group">
        <span>⏱ Hẹn giờ:</span>
        <select id="sleep-timer" onchange="startSleepTimer(this.value)">
            <option value="0" selected>Tắt</option>
            <option value="15">15m</option>
            <option value="30">30m</option>
            <option value="45">45m</option>
            <option value="60">60m</option>
        </select>
        <span id="timer-countdown" style="font-weight: bold; color: #27ae60; display: none;"></span>
    </div>

    <div class="tool-group">
        <button onclick="changeFontSize(-1)">A-</button>
        <button onclick="changeFontSize(1)">A+</button>
        <select id="font-select" onchange="setReaderFont(this.value)" style="max-width: 80px;">
            <option value="'Inter', sans-serif">Inter</option>
            <option value="'Roboto', sans-serif">Roboto</option>
            <option value="'Lora', serif">Lora</option>
            <option value="'Playfair Display', serif">Playfair</option>
        </select>
        <select id="theme-select" onchange="setReaderTheme(this.value)">
            <option value="kem">Kem</option>
            <option value="vang">Vàng</option>
            <option value="toi">Tối</option>
        </select>
    </div>
</div>


  
    <div class="overlay" id="overlay" onclick="toggleTOC()"></div>
<div class="toc-sidebar" id="toc-sidebar">
    <div class="toc-header">
        <h3 style="margin:0;">Mục Lục</h3>
        <button onclick="toggleTOC()">Đóng X</button>
    </div>
    <ul class="toc-list" id="toc-list"></ul>
</div>

<!-- NỘI DUNG TRUYỆN CHỮ -->
<div class="container">
    <h1 id="chapter-title">Đang quét dữ liệu...</h1>
    <div class="content" id="chapter-content">Vui lòng chờ trong giây lát...</div>
</div>

<!-- THANH ĐIỀU HƯỚNG ẢO CỐ ĐỊNH Ở ĐÁY MÀN HÌNH -->
<div class="fixed-navigation">
    <button id="prev-btn" class="nav-btn" onclick="changeChapter(-1)">« Chương Trước</button>
    <button id="next-btn" class="nav-btn" onclick="changeChapter(1)">Chương Sau »</button>
</div>

<script>
      // Đảm bảo điền đúng tên file truyện .txt của bạn trên GitHub ở đây
    const FILE_NAME = "Hoang_Co_Thanh_The_Phan_1.txt";

    let chapters = [];
    let currentChapterIndex = 0;
    let currentSize = 18;
    
    // ĐOẠN SỬA LỖI: Khai báo lại luồng xử lý Audio
    let synth = window.speechSynthesis;
    let currentUtterance = null;
    let isSpeaking = false;
    let currentSpeed = 1.0;
    let sleepTimeout = null;
    let countdownInterval = null;

        // Biến toàn cục theo dõi vị trí cuộn màn hình
    let lastScrollTop = 0;
    let isMenuManuallyClosed = false;

    function initSettings() {
        const savedSize = localStorage.getItem('reader-size');
        if (savedSize) {
            currentSize = parseInt(savedSize);
            document.documentElement.style.setProperty('--size-reader', currentSize + 'px');
        }
        const savedFont = localStorage.getItem('reader-font');
        if (savedFont) {
            document.documentElement.style.setProperty('--font-reader', savedFont);
            document.getElementById('font-select').value = savedFont;
        }
        const savedTheme = localStorage.getItem('reader-theme');
        if (savedTheme) {
            setReaderTheme(savedTheme);
            document.getElementById('theme-select').value = savedTheme;
        }
        
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (height > 0) ? (winScroll / height) * 100 : 0;
            document.getElementById("progress-bar").style.width = scrolled + "%";
            
            let toolbar = document.getElementById('main-toolbar');
            let tab = document.getElementById('pull-tab');
            
            if (!isMenuManuallyClosed) {
                if (winScroll > lastScrollTop && winScroll > 150) {
                    toolbar.classList.add('hide-menu');
                    tab.innerText = "▼";
                } else if (winScroll < lastScrollTop) {
                    toolbar.classList.remove('hide-menu');
                    tab.innerText = "▲";
                }
            }
            lastScrollTop = winScroll <= 0 ? 0 : winScroll;
        };
    }

       // ĐIỀU KHIỂN HỢP NHẤT ICON TAY NẮM CỬA
    function toggleToolbarManual() {
        let toolbar = document.getElementById('main-toolbar');
        let tab = document.getElementById('pull-tab');
        
        if (toolbar.classList.contains('hide-menu')) {
            // Nếu đang đóng -> Kéo sập xuống mở ra
            toolbar.classList.remove('hide-menu');
            tab.innerText = "▲"; // Đổi thành mũi tên hướng lên để báo hiệu có thể đẩy lên đóng lại
            isMenuManuallyClosed = false; 
        } else {
            // Nếu đang mở -> Kéo đóng sập lên trên
            toolbar.classList.add('hide-menu');
            tab.innerText = "▼"; // Đổi thành mũi tên hướng xuống để báo hiệu có thể kéo xuống mở ra
            isMenuManuallyClosed = true; 
        }
    }

    function changeFontSize(delta) {
        currentSize += delta;
        if (currentSize < 14) currentSize = 14;
        if (currentSize > 32) currentSize = 32;
        document.documentElement.style.setProperty('--size-reader', currentSize + 'px');
        localStorage.setItem('reader-size', currentSize);
    }

    function setReaderFont(fontFamily) {
        document.documentElement.style.setProperty('--font-reader', fontFamily);
        localStorage.setItem('reader-font', fontFamily);
    }
    function setReaderTheme(theme) {
        const root = document.documentElement;
        if (theme === 'kem') {
            root.style.setProperty('--bg-body', '#f7f4eb');
            root.style.setProperty('--bg-container', '#faf8f5');
            root.style.setProperty('--text-color', '#2b2b2b');
            root.style.setProperty('--border-color', '#eae6db');
            root.style.setProperty('--btn-bg', '#2b2b2b');
            root.style.setProperty('--btn-text', '#f7f4eb');
        } else if (theme === 'vang') {
            root.style.setProperty('--bg-body', '#f4ecd8');
            root.style.setProperty('--bg-container', '#fdf6e3');
            root.style.setProperty('--text-color', '#332a15');
            root.style.setProperty('--border-color', '#e1d4b3');
            root.style.setProperty('--btn-bg', '#332a15');
            root.style.setProperty('--btn-text', '#fdf6e3');
        } else if (theme === 'toi') {
            root.style.setProperty('--bg-body', '#141414');
            root.style.setProperty('--bg-container', '#1e1e1e');
            root.style.setProperty('--text-color', '#b5b5b5');
            root.style.setProperty('--border-color', '#2d2d2d');
            root.style.setProperty('--btn-bg', '#b5b5b5');
            root.style.setProperty('--btn-text', '#141414');
        }
        localStorage.setItem('reader-theme', theme);
    }

    function toggleTOC() {
        const sidebar = document.getElementById('toc-sidebar');
        const overlay = document.getElementById('overlay');
        if (sidebar.style.display === 'flex') {
            sidebar.style.display = 'none';
            overlay.style.display = 'none';
        } else {
            sidebar.style.display = 'flex';
            overlay.style.display = 'block';
            const items = document.querySelectorAll('.toc-list li');
            items.forEach((item, idx) => {
                if (idx === currentChapterIndex) item.classList.add('active');
                else item.classList.remove('active');
            });
        }
    }

    function getVietnameseFemaleVoice() {
        if (!synth) return null;
        let voices = synth.getVoices();
        let femaleVoice = voices.find(voice => 
            voice.lang.includes('vi') && 
            (voice.name.toLowerCase().includes('female') || 
             voice.name.toLowerCase().includes('google') || 
             voice.name.toLowerCase().includes('hoaiami') || 
             voice.name.toLowerCase().includes('an'))
        );
        if (!femaleVoice) {
            femaleVoice = voices.find(voice => voice.lang.includes('vi'));
        }
        return femaleVoice;
    }

    function toggleAudio() {
        const btn = document.getElementById('audio-btn');
        if (isSpeaking) {
            synth.cancel();
            isSpeaking = false;
            btn.innerText = "▶ Đọc";
            btn.classList.remove('audio-active');
        } else {
            const textToRead = document.getElementById('chapter-content').innerText;
            if (!textToRead) return;
            synth.cancel();

            currentUtterance = new SpeechSynthesisUtterance(textToRead);
            const voice = getVietnameseFemaleVoice();
            if (voice) currentUtterance.voice = voice;
            currentUtterance.rate = currentSpeed;

            currentUtterance.onend = () => {
                isSpeaking = false;
                btn.innerText = "▶ Đọc";
                btn.classList.remove('audio-active');
                if (currentChapterIndex < chapters.length - 1) {
                    changeChapter(1);
                    setTimeout(() => toggleAudio(), 1000); 
                }
            };

            currentUtterance.onerror = () => {
                isSpeaking = false;
                btn.innerText = "▶ Đọc";
                btn.classList.remove('audio-active');
            };

            synth.speak(currentUtterance);
            isSpeaking = true;
            btn.innerText = "⏸ Dừng";
            btn.classList.add('audio-active');
        }
    }

    function changeSpeed(val) {
        currentSpeed = parseFloat(val);
        if (isSpeaking) {
            toggleAudio();
            toggleAudio();
        }
    }

    function startSleepTimer(minutes) {
        const val = parseInt(minutes);
        const countdownLabel = document.getElementById('timer-countdown');
        clearTimeout(sleepTimeout);
        clearInterval(countdownInterval);
        countdownLabel.style.display = 'none';

        if (val === 0) return;

        let timeRemaining = val * 60; 
        countdownLabel.style.display = 'inline';
        
        function updateCountdownDisplay() {
            let mins = Math.floor(timeRemaining / 60);
            let secs = timeRemaining % 60;
            countdownLabel.innerText = `(${mins}:${secs < 10 ? '0' : ''}${secs})`;
        }
        updateCountdownDisplay();

        countdownInterval = setInterval(() => {
            timeRemaining--;
            if (timeRemaining <= 0) {
                clearInterval(countdownInterval);
                countdownLabel.style.display = 'none';
                document.getElementById('sleep-timer').value = "0";
                if (isSpeaking) { toggleAudio(); }
                alert("⏱ Đã hết giờ hẹn! Ứng dụng đã dừng đọc Audio.");
            } else {
                updateCountdownDisplay();
            }
        }, 1000);
    }

    if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = getVietnameseFemaleVoice;
    }

    async function loadStoryFile() {
        try {
            const response = await fetch(FILE_NAME);
            if (!response.ok) {
                throw new Error("Không tìm thấy file truyện hoặc lỗi đường truyền.");
            }
            const buffer = await response.arrayBuffer();
            const decoder = new TextDecoder('utf-8');
            const text = decoder.decode(buffer);
            
            const regex = /===\s*(.*?)\s*===/g;
            let matches = [];
            let match;
            
            while ((match = regex.exec(text)) !== null) {
                matches.push({
                    title: match[1].trim(),
                    index: match.index,
                    lastIndex: regex.lastIndex
                });
            }
            
            chapters = [];
            if (matches.length === 0) {
                chapters.push({ title: "Toàn bộ nội dung", content: text.trim() });
            } else {
                for (let i = 0; i < matches.length; i++) {
                    let start = matches[i].lastIndex;
                    let end = text.length;
                    if (i + 1 < matches.length) {
                        end = matches[i + 1].index;
                    }
                    let body = text.substring(start, end).trim();
                    chapters.push({
                        title: matches[i].title,
                        content: body
                    });
                }
            }
            
            const tocList = document.getElementById('toc-list');
            tocList.innerHTML = "";
            chapters.forEach((chap, index) => {
                let li = document.createElement('li');
                li.innerText = chap.title;
                li.onclick = () => {
                    jumpToChapter(index);
                    toggleTOC();
                };
                tocList.appendChild(li);
            });

            const savedChapter = localStorage.getItem('current-chapter-index');
            if (savedChapter && parseInt(savedChapter) < chapters.length) {
                currentChapterIndex = parseInt(savedChapter);
            } else {
                currentChapterIndex = 0;
            }
            
            renderChapter();
        } catch (error) {
            document.getElementById('chapter-content').innerHTML = `<span style="color:red; font-weight:bold;">Lỗi:</span> ${error.message}`;
        }
    }

    function renderChapter() {
        if (chapters.length === 0) return;
        if (isSpeaking) {
            synth.cancel();
            isSpeaking = false;
            document.getElementById('audio-btn').innerText = "▶ Đọc";
            document.getElementById('audio-btn').classList.remove('audio-active');
        }

        const chap = chapters[currentChapterIndex];
        document.getElementById('chapter-title').innerText = chap.title;
        document.getElementById('chapter-content').innerText = chap.content;
        
        document.getElementById('prev-btn').disabled = (currentChapterIndex === 0);
        document.getElementById('next-btn').disabled = (currentChapterIndex === chapters.length - 1);
        
        localStorage.setItem('current-chapter-index', currentChapterIndex);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function changeChapter(direction) {
        currentChapterIndex += direction;
        if (currentChapterIndex >= 0 && currentChapterIndex < chapters.length) {
            renderChapter();
        }
    }

    function jumpToChapter(index) {
        if (index >= 0 && index < chapters.length) {
            currentChapterIndex = index;
            renderChapter();
        }
    }

    window.onload = () => {
        initSettings();
        loadStoryFile();
    };
</script>

</body>
</html>
