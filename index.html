<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THUẬN ĐỌC TRUYỆN</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f7f4eb;     
            --bg-container: #faf8f5;
            --text-color: #2b2b2b;
            --border-color: #eae6db;
            --btn-bg: #2b2b2b;
            --btn-text: #f7f4eb;
            --font-reader: 'Inter', sans-serif;
            --size-reader: 18px;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-color);
            font-family: var(--font-reader);
            font-size: var(--size-reader);
            line-height: 1.6;
            margin: 0;
            padding: 90px 20px 80px 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s, color 0.3s;
        }

        /* THANH CHỨC NĂNG CỐ ĐỊNH PHẲNG (FIXED TOOLBAR) */
        .toolbar {
            position: fixed;
            top: 4px; 
            left: 50%;
            transform: translateX(-50%);
            max-width: 680px;
            width: 100%;
            background-color: var(--bg-container);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            box-sizing: border-box;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            z-index: 999;
            transition: top 0.25s ease-out; 
        }

        .toolbar.hide-menu {
            top: -65px; 
        }

        /* THIẾT KẾ NÚT TAY NẮM CỬA LUÔN NỔI */
        .pull-tab {
            position: absolute;
            bottom: -22px; 
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--bg-container);
            border: 1px solid var(--border-color);
            border-top: none; 
            padding: 2px 25px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 0 0 10px 10px;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            z-index: 1000;
        }

        /* KHẮC PHỤC LỖI BUNG MỤC LỤC: ẨN VÀ ĐƯA MỤC LỤC VỀ SIDEBAR BÊN TRÁI */
        .toc-sidebar {
            display: none; 
            position: fixed;
            top: 0; 
            left: 0;
            width: 320px;
            height: 100%;
            background-color: var(--bg-container);
            border-right: 1px solid var(--border-color);
            box-shadow: 4px 0 15px rgba(0,0,0,0.15);
            z-index: 1001; 
            padding: 20px;
            box-sizing: border-box;
            flex-direction: column;
        }

        .toc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .overlay {
            display: none; 
            position: fixed;
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .toc-list {
            overflow-y: auto;
            flex-grow: 1;
            list-style: none;
            padding: 0;
            margin: 15px 0 0 0;
        }

        .toc-list li {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-color);
        }

        .toc-list li:hover, .toc-list li.active {
            background-color: var(--bg-body);
            font-weight: 600;
        }

        /* NỘI DUNG TRUYỆN CHỮ */
        .container {
            max-width: 680px;
            width: 100%;
            background-color: var(--bg-container);
            border: 1px solid var(--border-color);
            padding: 40px 30px;
            box-sizing: border-box;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            margin-bottom: 40px;
        }

        h1 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            text-align: center;
        }

        .content {
            white-space: pre-wrap;
            word-wrap: break-word;
            text-align: justify;
        }

        /* THANH ĐIỀU HƯỚNG CỐ ĐỊNH Ở ĐÁY MÀN HÌNH */
        .fixed-navigation {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            max-width: 680px;
            width: 100%;
            background-color: var(--bg-container);
            border-top: 1px solid var(--border-color);
            padding: 12px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            z-index: 998;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
            border-radius: 8px 8px 0 0;
        }

        .nav-btn {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tool-group button, .tool-group select, .toc-header button {
            background-color: var(--bg-body);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        .audio-active {
            background-color: #2ecc71 !important;
            color: #fff !important;
            border-color: #27ae60 !important;
        }

        /* Tối ưu ẩn menu riêng cho màn hình điện thoại di động */
        @media (max-width: 600px) {
            body { padding: 130px 10px 70px 10px; } 
            .toolbar { gap: 6px; padding: 8px; border-radius: 0; }
            .toolbar.hide-menu { 
                top: -115px; 
            } 
            .container { padding: 25px 15px; }
            h1 { font-size: 20px; }
            .fixed-navigation { border-radius: 0; padding: 10px; }
            .nav-btn { padding: 8px 14px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div id="progress-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 4px; background-color: rgba(0,0,0,0.05); z-index: 10000;">
    <div id="progress-bar" style="width: 0%; height: 100%; background-color: #2ecc71; transition: width 0.1s ease;"></div>
</div>

<div class="toolbar" id="main-toolbar">
    <div class="pull-tab" id="pull-tab" onclick="toggleToolbarManual()">▲</div>
<!-- Nút chọn file ẩn và Nút bấm kích hoạt -->
<input type="file" id="offline-file-input" accept=".txt" style="display: none;" onchange="loadOfflineStory(this)">
<button class="tool-btn" onclick="document.getElementById('offline-file-input').click()" title="Mở file truyện từ máy">
    📂 Mở truyện Offline
</button>
<!-- (Tùy chọn) Nút quay lại truyện mặc định -->
<button class="tool-btn" id="reset-default-btn" onclick="resetToDefaultStory()" style="display: none;" title="Đọc lại truyện mặc định của web">
    🔄 Truyện gốc
</button>
    <div class="tool-group">
        <button onclick="toggleTOC()">☰ Mục Lục</button>
    </div>
    
    <div class="tool-group">
        <button id="audio-btn" onclick="toggleAudio()">▶ Đọc</button>
        <select id="speed-select" onchange="changeSpeed(this.value)">
            <option value="1.0" selected>1.0x</option>
            <option value="1.1">1.1x</option>
            <option value="1.2">1.2x</option>
            <option value="1.3">1.3x</option>
        </select>
    </div>

    <div class="tool-group">
        <span>⏱ Hẹn giờ:</span>
        <select id="sleep-timer" onchange="startSleepTimer(this.value)">
            <option value="0" selected>Tắt</option>
            <option value="15">15m</option>
            <option value="30">30m</option>
            <option value="45">45m</option>
            <option value="60">60m</option>
        </select>
        <span id="timer-countdown" style="font-weight: bold; color: #27ae60; display: none;"></span>
    </div>

    <div class="tool-group">
        <button onclick="changeFontSize(-1)">A-</button>
        <button onclick="changeFontSize(1)">A+</button>
        <select id="font-select" onchange="setReaderFont(this.value)" style="max-width: 80px;">
            <option value="'Inter', sans-serif">Inter</option>
            <option value="'Roboto', sans-serif">Roboto</option>
            <option value="'Lora', serif">Lora</option>
            <option value="'Playfair Display', serif">Playfair</option>
        </select>
        <select id="theme-select" onchange="setReaderTheme(this.value)">
            <option value="kem">Kem</option>
            <option value="vang">Vàng</option>
            <option value="toi">Tối</option>
        </select>
    </div>
</div>

<div class="overlay" id="overlay" onclick="toggleTOC()"></div>
<div class="toc-sidebar" id="toc-sidebar">
    <div class="toc-header">
        <h3 style="margin:0;">Mục Lục</h3>
        <button onclick="toggleTOC()">Đóng X</button>
    </div>
    <ul class="toc-list" id="toc-list"></ul>
</div>

<div class="container">
    <h1 id="chapter-title">Đang quét dữ liệu...</h1>
    <div class="content" id="chapter-content">Vui lòng chờ trong giây lát...</div>
</div>

<div class="fixed-navigation">
    <button id="prev-btn" class="nav-btn" onclick="changeChapter(-1)">« Chương Trước</button>
    <button id="next-btn" class="nav-btn" onclick="changeChapter(1)">Chương Sau »</button>
</div>
<script>
    const FILE_NAME = "Con_Duong_Ba_Chu_Phan_1.txt";

    let chapters = [];
    let currentChapterIndex = 0;
    let currentSize = 18;
    
    let synth = window.speechSynthesis;
    let currentUtterance = null;
    let isSpeaking = false;
    let currentSpeed = 1.0;
    let sleepTimeout = null;
    let countdownInterval = null;

    let lastScrollTop = 0;
    let isMenuManuallyClosed = false;

    // === CÁC BIẾN QUẢN LÝ BĂM NHỎ VĂN BẢN (CHUNKING ENGINE) ===
    let sentenceArray = [];
    let currentSentenceIndex = 0;
    let isUserStopping = false;

    // === VŨ KHÍ 1: TẠO LUỒNG ÂM THANH CÂM GIỮ NHỊP NỀN (KEEP-ALIVE) ===
    const silentAudio = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA");
    silentAudio.loop = true;

    function startBackgroundKeepAlive() {
        silentAudio.play().catch(() => {});
    }

    function stopBackgroundKeepAlive() {
        silentAudio.pause();
    }

    // === VŨ KHÍ 2: TÍCH HỢP ĐIỀU KHIỂN LÊN MÀN HÌNH KHÓA ===
    function setupMediaSession(title) {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: title,
                artist: 'Thuận Đọc Truyện (Audio AI)',
                album: localStorage.getItem('offline-story-name') || 'Con Đường Bá Chủ'
            });

            navigator.mediaSession.setActionHandler('play', () => { if (!isSpeaking) toggleAudio(); });
            navigator.mediaSession.setActionHandler('pause', () => { if (isSpeaking) toggleAudio(); });
            navigator.mediaSession.setActionHandler('previoustrack', () => { changeChapter(-1); });
            navigator.mediaSession.setActionHandler('nexttrack', () => { changeChapter(1); });
        }
    }

    function initSettings() {
        const savedSize = localStorage.getItem('reader-size');
        if (savedSize) {
            currentSize = parseInt(savedSize);
            document.documentElement.style.setProperty('--size-reader', currentSize + 'px');
        }
        const savedFont = localStorage.getItem('reader-font');
        if (savedFont) {
            document.documentElement.style.setProperty('--font-reader', savedFont);
            const fs = document.getElementById('font-select');
            if (fs) fs.value = savedFont;
        }
        const savedTheme = localStorage.getItem('reader-theme');
        if (savedTheme) {
            setReaderTheme(savedTheme);
            const ts = document.getElementById('theme-select');
            if (ts) ts.value = savedTheme;
        }
        
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (height > 0) ? (winScroll / height) * 100 : 0;
            const pb = document.getElementById("progress-bar");
            if (pb) pb.style.width = scrolled + "%";
            
            let toolbar = document.getElementById('main-toolbar');
            let tab = document.getElementById('pull-tab');
            
            if (toolbar && tab && !isMenuManuallyClosed) {
                if (winScroll > lastScrollTop && winScroll > 150) {
                    toolbar.classList.add('hide-menu');
                    tab.innerText = "▼";
                } else if (winScroll < lastScrollTop) {
                    toolbar.classList.remove('hide-menu');
                    tab.innerText = "▲";
                }
            }
            lastScrollTop = winScroll <= 0 ? 0 : winScroll;
        };
    }

    function toggleToolbarManual() {
        let toolbar = document.getElementById('main-toolbar');
        let tab = document.getElementById('pull-tab');
        if (!toolbar || !tab) return;
        
        if (toolbar.classList.contains('hide-menu')) {
            toolbar.classList.remove('hide-menu');
            tab.innerText = "▲";
            isMenuManuallyClosed = false; 
        } else {
            toolbar.classList.add('hide-menu');
            tab.innerText = "▼";
            isMenuManuallyClosed = true; 
        }
    }

    function changeFontSize(delta) {
        currentSize += delta;
        if (currentSize < 14) currentSize = 14;
        if (currentSize > 32) currentSize = 32;
        document.documentElement.style.setProperty('--size-reader', currentSize + 'px');
        localStorage.setItem('reader-size', currentSize);
    }

    function setReaderFont(fontFamily) {
        document.documentElement.style.setProperty('--font-reader', fontFamily);
        localStorage.setItem('reader-font', fontFamily);
    }

    function setReaderTheme(theme) {
        const root = document.documentElement;
        if (theme === 'kem') {
            root.style.setProperty('--bg-body', '#f7f4eb');
            root.style.setProperty('--bg-container', '#faf8f5');
            root.style.setProperty('--text-color', '#2b2b2b');
            root.style.setProperty('--border-color', '#eae6db');
            root.style.setProperty('--btn-bg', '#2b2b2b');
            root.style.setProperty('--btn-text', '#f7f4eb');
        } else if (theme === 'vang') {
            root.style.setProperty('--bg-body', '#f4ecd8');
            root.style.setProperty('--bg-container', '#fdf6e3');
            root.style.setProperty('--text-color', '#332a15');
            root.style.setProperty('--border-color', '#e1d4b3');
            root.style.setProperty('--btn-bg', '#332a15');
            root.style.setProperty('--btn-text', '#fdf6e3');
        } else if (theme === 'toi') {
            root.style.setProperty('--bg-body', '#141414');
            root.style.setProperty('--bg-container', '#1e1e1e');
            root.style.setProperty('--text-color', '#b5b5b5');
            root.style.setProperty('--border-color', '#2d2d2d');
            root.style.setProperty('--btn-bg', '#b5b5b5');
            root.style.setProperty('--btn-text', '#141414');
        }
        localStorage.setItem('reader-theme', theme);
    }

    function toggleTOC() {
        const sidebar = document.getElementById('toc-sidebar');
        const overlay = document.getElementById('overlay');
        if (!sidebar || !overlay) return;

        if (sidebar.style.display === 'flex') {
            sidebar.style.display = 'none';
            overlay.style.display = 'none';
        } else {
            sidebar.style.display = 'flex';
            overlay.style.display = 'block';
            const items = document.querySelectorAll('.toc-list li');
            items.forEach((item, idx) => {
                if (idx === currentChapterIndex) item.classList.add('active');
                else item.classList.remove('active');
            });
        }
    }

    function getVietnameseFemaleVoice() {
        if (!synth) return null;
        let voices = synth.getVoices();
        let femaleVoice = voices.find(voice => 
            voice.lang.includes('vi') && 
            (voice.name.toLowerCase().includes('female') || 
             voice.name.toLowerCase().includes('google') || 
             voice.name.toLowerCase().includes('hoaiami') || 
             voice.name.toLowerCase().includes('an'))
        );
        if (!femaleVoice) {
            femaleVoice = voices.find(voice => voice.lang.includes('vi'));
        }
        return femaleVoice;
    }

    // === THUẬT TOÁN BĂM NHỎ VĂN BẢN (CHUNKING) CHỐNG TRÀN BỘ NHỚ ===
    function chunkText(text) {
        let raw = text.replace(/([.?!;\n]+)/g, "$1|").split("|");
        let chunks = [];
        let temp = "";
        for (let i = 0; i < raw.length; i++) {
            let part = raw[i].trim();
            if (!part) continue;
            
            if (part.length >= 180) {
                if (temp) { chunks.push(temp); temp = ""; }
                let subParts = part.match(/.{1,160}(?:[,\\s]|$)/g) || [part];
                subParts.forEach(sp => { if (sp.trim()) chunks.push(sp.trim()); });
                continue;
            }

            if ((temp + " " + part).length < 180) {
                temp = (temp ? temp + " " : "") + part;
            } else {
                if (temp) chunks.push(temp);
                temp = part;
            }
        }
        if (temp) chunks.push(temp);
        return chunks;
    }

    // === HỆ THỐNG ĐỌC NỐI TIẾP TỪNG CÂU ===
    function playNextSentence() {
        if (!isSpeaking) return;
        
        if (currentSentenceIndex >= sentenceArray.length) {
            isSpeaking = false;
            currentSentenceIndex = 0;
            localStorage.removeItem('audio-progress-' + currentChapterIndex);
            
            const btn = document.getElementById('audio-btn');
            if (btn) {
                btn.innerText = "▶ Đọc";
                btn.classList.remove('audio-active');
            }
            
            if (currentChapterIndex < chapters.length - 1) {
                changeChapter(1);
                setTimeout(() => toggleAudio(), 1000); 
            } else {
                stopBackgroundKeepAlive();
            }
            return;
        }

        let textToSpeak = sentenceArray[currentSentenceIndex];
        currentUtterance = new SpeechSynthesisUtterance(textToSpeak);
        const voice = getVietnameseFemaleVoice();
        if (voice) currentUtterance.voice = voice;
        currentUtterance.rate = currentSpeed;

        currentUtterance.onend = () => {
            if (isUserStopping) return; 
            
            currentSentenceIndex++;
            localStorage.setItem('audio-progress-' + currentChapterIndex, currentSentenceIndex);
            
            let ratio = currentSentenceIndex / sentenceArray.length;
            let scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
            if (scrollHeight > 0) {
                window.scrollTo({ top: scrollHeight * ratio, behavior: 'smooth' });
            }
            
            playNextSentence();
        };

        currentUtterance.onerror = (e) => {
            if (isUserStopping || e.error === 'interrupted' || e.error === 'canceled') return;
            currentSentenceIndex++;
            playNextSentence();
        };

        synth.speak(currentUtterance);
    }

    function toggleAudio() {
        const btn = document.getElementById('audio-btn');
        if (!btn) return;

        if (isSpeaking) {
            isUserStopping = true;
            synth.cancel();
            isSpeaking = false;
            stopBackgroundKeepAlive();
            btn.innerText = "▶ Đọc";
            btn.classList.remove('audio-active');
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
        } else {
            const contentElem = document.getElementById('chapter-content');
            if (!contentElem) return;
            const fullText = contentElem.innerText;
            if (!fullText) return;

            sentenceArray = chunkText(fullText);
            
            const savedProgress = localStorage.getItem('audio-progress-' + currentChapterIndex);
            currentSentenceIndex = savedProgress ? parseInt(savedProgress) : 0;
            if (currentSentenceIndex >= sentenceArray.length) currentSentenceIndex = 0;

            isSpeaking = true;
            isUserStopping = false;
            btn.innerText = "⏸ Dừng";
            btn.classList.add('audio-active');

            startBackgroundKeepAlive();
            if (chapters[currentChapterIndex]) {
                setupMediaSession(chapters[currentChapterIndex].title);
            }
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';

            playNextSentence();
        }
    }

    function changeSpeed(val) {
        currentSpeed = parseFloat(val);
        if (isSpeaking) {
            isUserStopping = true;
            synth.cancel();
            setTimeout(() => {
                isUserStopping = false;
                playNextSentence();
            }, 150);
        }
    }

    function startSleepTimer(minutes) {
        const val = parseInt(minutes);
        const countdownLabel = document.getElementById('timer-countdown');
        if (!countdownLabel) return;
        
        clearTimeout(sleepTimeout);
        clearInterval(countdownInterval);
        countdownLabel.style.display = 'none';

        if (val === 0) return;

        let timeRemaining = val * 60; 
        countdownLabel.style.display = 'inline';
        
        function updateCountdownDisplay() {
            let mins = Math.floor(timeRemaining / 60);
            let secs = timeRemaining % 60;
            countdownLabel.innerText = `(${mins}:${secs < 10 ? '0' : ''}${secs})`;
        }
        updateCountdownDisplay();

        countdownInterval = setInterval(() => {
            timeRemaining--;
            if (timeRemaining <= 0) {
                clearInterval(countdownInterval);
                countdownLabel.style.display = 'none';
                document.getElementById('sleep-timer').value = "0";
                if (isSpeaking) { toggleAudio(); }
                alert("⏱ Đã hết giờ hẹn! Ứng dụng đã dừng đọc Audio.");
            } else {
                updateCountdownDisplay();
            }
        }, 1000);
    }

    if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = getVietnameseFemaleVoice;
    }

    // === HỆ THỐNG XỬ LÝ VĂN BẢN CHUNG (CHO CẢ ONLINE & OFFLINE) ===
    function parseStoryText(text, isOffline = false, customTitle = null) {
        const regex = /===\s*(.*?)\s*===/g;
        let matches = [];
        let match;
        
        while ((match = regex.exec(text)) !== null) {
            matches.push({
                title: match[1].trim(),
                index: match.index,
                lastIndex: regex.lastIndex
            });
        }
        
        chapters = [];
        if (matches.length === 0) {
            let titleName = customTitle ? customTitle.replace('.txt', '') : "Toàn bộ nội dung";
            chapters.push({ title: titleName, content: text.trim() });
        } else {
            for (let i = 0; i < matches.length; i++) {
                let start = matches[i].lastIndex;
                let end = text.length;
                if (i + 1 < matches.length) {
                    end = matches[i + 1].index;
                }
                let body = text.substring(start, end).trim();
                chapters.push({
                    title: matches[i].title,
                    content: body
                });
            }
        }
        
        const tocList = document.getElementById('toc-list');
        if (tocList) {
            tocList.innerHTML = "";
            chapters.forEach((chap, index) => {
                let li = document.createElement('li');
                li.innerText = chap.title;
                li.onclick = () => {
                    jumpToChapter(index);
                    toggleTOC();
                };
                tocList.appendChild(li);
            });
        }

        const savedChapter = localStorage.getItem('current-chapter-index');
        if (savedChapter && parseInt(savedChapter) < chapters.length && !isOffline) {
            currentChapterIndex = parseInt(savedChapter);
        } else {
            currentChapterIndex = 0;
        }
        
        renderChapter();
    }

    // === TÍNH NĂNG ĐỌC TRUYỆN OFFLINE (FILEREADER API) ===
    function loadOfflineStory(input) {
        const file = input.files[0];
        if (!file) return;

        if (isSpeaking) toggleAudio(); // Tắt âm thanh bài cũ nếu đang đọc

        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            
            // Lưu truyện vào bộ nhớ điện thoại để lần sau mở app không cần tải lại
            localStorage.setItem('offline-story-content', text);
            localStorage.setItem('offline-story-name', file.name);
            localStorage.removeItem('current-chapter-index'); // Reset về chương 1 cho truyện mới
            
            // Hiện nút quay lại truyện mặc định
            const resetBtn = document.getElementById('reset-default-btn');
            if (resetBtn) resetBtn.style.display = 'inline-block';

            parseStoryText(text, true, file.name);
            alert("🎉 Đã tải và lưu truyện Offline: " + file.name + "\n(Từ giờ bạn có thể tắt mạng mở app đọc thoải mái!)");
        };
        reader.readAsText(file, "UTF-8");
    }

    // === NÚT QUAY LẠI TRUYỆN MẶC ĐỊNH ===
    function resetToDefaultStory() {
        if (isSpeaking) toggleAudio();
        localStorage.removeItem('offline-story-content');
        localStorage.removeItem('offline-story-name');
        localStorage.removeItem('current-chapter-index');
        
        const resetBtn = document.getElementById('reset-default-btn');
        if (resetBtn) resetBtn.style.display = 'none';
        
        loadStoryFile();
    }

    // === TẢI TRUYỆN KHI MỞ APP ===
    async function loadStoryFile() {
        // Kiểm tra xem trước đó người dùng có đang đọc truyện Offline không
        const savedOfflineContent = localStorage.getItem('offline-story-content');
        const savedOfflineName = localStorage.getItem('offline-story-name');
        
        if (savedOfflineContent) {
            const resetBtn = document.getElementById('reset-default-btn');
            if (resetBtn) resetBtn.style.display = 'inline-block';
            
            parseStoryText(savedOfflineContent, false, savedOfflineName);
            return;
        }

        try {
            const response = await fetch(FILE_NAME);
            if (!response.ok) {
                throw new Error(`Không tìm thấy file "${FILE_NAME}" trên server.`);
            }
            const buffer = await response.arrayBuffer();
            const decoder = new TextDecoder('utf-8');
            const text = decoder.decode(buffer);
            
            parseStoryText(text);
        } catch (error) {
            const contentElem = document.getElementById('chapter-content');
            if (contentElem) {
                contentElem.innerHTML = `<div style="color:#ff4d4d; padding:20px; text-align:center; font-weight:bold;">⚠️ LỖI TẢI TRUYỆN:<br>${error.message}<br><br>💡 Bạn hãy bấm nút "📂 Mở truyện Offline" để chọn file .txt từ điện thoại nhé!</div>`;
            }
            const titleElem = document.getElementById('chapter-title');
            if (titleElem) titleElem.innerText = "Chưa có nội dung";
        }
    }

    function renderChapter() {
        if (chapters.length === 0) return;
        if (isSpeaking) {
            isUserStopping = true;
            synth.cancel();
            isSpeaking = false;
            stopBackgroundKeepAlive();
            const btn = document.getElementById('audio-btn');
            if (btn) {
                btn.innerText = "▶ Đọc";
                btn.classList.remove('audio-active');
            }
        }

        const chap = chapters[currentChapterIndex];
        const titleElem = document.getElementById('chapter-title');
        const contentElem = document.getElementById('chapter-content');
        
        if (titleElem) titleElem.innerText = chap.title;
        if (contentElem) contentElem.innerText = chap.content;
        
        setupMediaSession(chap.title);
        
        sentenceArray = chunkText(chap.content);
        const savedProgress = localStorage.getItem('audio-progress-' + currentChapterIndex);
        currentSentenceIndex = savedProgress ? parseInt(savedProgress) : 0;
        
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        
        if (prevBtn) prevBtn.disabled = (currentChapterIndex === 0);
        if (nextBtn) nextBtn.disabled = (currentChapterIndex === chapters.length - 1);
        
        localStorage.setItem('current-chapter-index', currentChapterIndex);
        
        if (currentSentenceIndex > 0 && sentenceArray.length > 0) {
            setTimeout(() => {
                let ratio = currentSentenceIndex / sentenceArray.length;
                let scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
                if (scrollHeight > 0) {
                    window.scrollTo({ top: scrollHeight * ratio, behavior: 'smooth' });
                }
            }, 200);
        } else {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function changeChapter(direction) {
        currentChapterIndex += direction;
        if (currentChapterIndex >= 0 && currentChapterIndex < chapters.length) {
            let wasSpeaking = isSpeaking;
            renderChapter();
            if (wasSpeaking) {
                setTimeout(() => toggleAudio(), 300);
            }
        }
    }

    function jumpToChapter(index) {
        if (index === currentChapterIndex) {
            currentSentenceIndex = 0;
            localStorage.removeItem('audio-progress-' + currentChapterIndex);
        }
        if (index >= 0 && index < chapters.length) {
            currentChapterIndex = index;
            renderChapter();
        }
    }

    window.onload = () => {
        initSettings();
        loadStoryFile();
    };
</script>
