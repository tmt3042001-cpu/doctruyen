<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Đọc Truyện Cá Nhân</title>
    <style>
        /* GIAO DIỆN TỐI ƯU CHO MẮT (MÀU NỀN SEPIA/DARK BẢO VỆ MẮT) */
        body {
            background-color: #1e1e1e;
            color: #e0dcd3;
            font-family: 'Georgia', 'Times New Roman', serif; /* Font chữ tiêu chuẩn của Ebook */
            font-size: 20px; /* Cỡ chữ vừa vặn, không mỏi mắt */
            line-height: 1.6; /* Khoảng cách dòng chuẩn */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 700px; /* Độ rộng tối ưu tầm mắt */
            width: 100%;
            background-color: #262626;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        h1 {
            font-size: 26px;
            color: #f1b855; /* Màu tiêu đề nổi bật nhưng dịu mắt */
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #3a3a3a;
            padding-bottom: 15px;
        }
        .content {
            white-space: pre-line; /* Giữ nguyên định dạng xuống dòng từ file txt */
            text-align: justify;
            word-wrap: break-word;
        }
        /* THIẾT KẾ NÚT CHUYỂN CHƯƠNG */
        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            border-top: 1px solid #3a3a3a;
            padding-top: 20px;
        }
        button {
            background-color: #f1b855;
            color: #1e1e1e;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
        }
        button:hover {
            background-color: #db9f3b;
        }
        button:disabled {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
        }
        /* Giao diện mobile */
        @media (max-width: 600px) {
            body { font-size: 18px; padding: 10px; }
            .container { padding: 15px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="chapter-title">Đang tải truyện...</h1>
    <div class="content" id="chapter-content">Vui lòng đợi trong giây lát...</div>
    
    <div class="navigation">
        <button id="prev-btn" onclick="changeChapter(-1)">« Chương Trước</button>
        <button id="next-btn" onclick="changeChapter(1)">Chương Sau »</button>
    </div>
</div>

<script>
    // Điền chính xác tên file truyện bạn đã cào vào mảng dưới đây
    const storyFiles = [
        "Hoang_Co_Thanh_The_Phan_1.txt",
        // Lần sau có thêm file, bạn chỉ cần phẩy xuống dòng điền tiếp vào đây
    ];

    let currentFileIndex = 0;
    let chapters = [];
    let currentChapterIndex = 0;

    // Hàm đọc file .txt và bóc tách cấu trúc === Chương X ===
    async function loadStory() {
        try {
            const response = await fetch(storyFiles[currentFileIndex]);
            const text = await response.text();
            
            // Tách các chương dựa trên ký tự nhận diện "=== Tiêu đề ==="
            const rawChapters = text.split(/===\s*(.*?)\s*===/g);
            
            chapters = [];
            for (let i = 1; i < rawChapters.length; i += 2) {
                chapters.push({
                    title: rawChapters[i].strip ? rawChapters[i].strip() : rawChapters[i],
                    content: rawChapters[i + 1] ? rawChapters[i + 1].trim() : ""
                });
            }
            
            if (chapters.length > 0) {
                currentChapterIndex = 0;
                renderChapter();
            } else {
                document.getElementById('chapter-content').innerText = "Không tìm thấy định dạng chương chuẩn trong file txt.";
            }
        } catch (error) {
            document.getElementById('chapter-content').innerText = "Lỗi khi tải file truyện: " + error.message;
        }
    }

    // Hiển thị nội dung lên màn hình
    function renderChapter() {
        const chap = chapters[currentChapterIndex];
        document.getElementById('chapter-title').innerText = chap.title;
        document.getElementById('chapter-content').innerText = chap.content;
        
        // Cập nhật trạng thái nút bấm ẩn/hiện
        document.getElementById('prev-btn').disabled = (currentChapterIndex === 0);
        document.getElementById('next-btn').disabled = (currentChapterIndex === chapters.length - 1);
        
        // Tự động cuộn lên đầu trang khi chuyển chương mới
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Điều hướng chương trước/sau
    function changeChapter(direction) {
        currentChapterIndex += direction;
        if (currentChapterIndex >= 0 && currentChapterIndex < chapters.length) {
            renderChapter();
        }
    }

    // Kích hoạt khi trang tải xong
    window.onload = loadStory;
</script>

</body>
</html>
